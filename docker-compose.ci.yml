services:
  repo:
    image: alpine/git:2.45.2
    environment:
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/moj-glitch/UpcycleConnect-PA-2025-2026.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
    volumes:
      - source:/workspace
    command: >
      sh -lc "rm -rf /workspace/* /workspace/.[!.]* /workspace/..?* 2>/dev/null || true
      && git clone --depth 1 --branch \"$${GIT_BRANCH}\" \"$${GIT_REPO_URL}\" /workspace"

  ci:
    image: golang:1.23-alpine
    working_dir: /workspace
    depends_on:
      repo:
        condition: service_completed_successfully
    volumes:
      - source:/workspace
    command: >
      sh -lc "cd oauth && go test ./... && go build -o /tmp/oauth . && cd ../api && go test ./... && go build -o /tmp/api ."

volumes:
  source:
