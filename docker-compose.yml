services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  oauth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REPO_URL: https://github.com/moj-glitch/UpcycleConnect-PA-2025-2026.git
        GIT_BRANCH: OAUTH-GO-MAIN
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      DATABASE_AUTH_URL_FILE: /run/secrets/database_url
      DATABASE_DATA_URL_FILE: /run/secrets/database_url
      DATABASE_PUBLIC_URL_FILE: /run/secrets/database_url
      DATABASE_PRO_URL_FILE: /run/secrets/database_url
      DATABASE_ADMIN_URL_FILE: /run/secrets/database_url
      OAUTH_URL: http://localhost/oauth/v3/introspect
      DATA_DIR: /data
    volumes:
      - appdata:/data
    secrets:
      - database_url
    networks:
      - appnet

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        GIT_REPO_URL: https://github.com/moj-glitch/UpcycleConnect-PA-2025-2026.git
        GIT_BRANCH: API-GO-MAIN
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - appnet

volumes:
  pgdata:
  appdata:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  database_url:
    file: ./secrets/database_url.txt

networks:
  appnet:
